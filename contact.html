<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Help Animals By Shamor Johnson</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background: url('https://i.pinimg.com/originals/6b/85/81/6b8581bfe76e5a075e0f9e8232d2f023.gif') no-repeat center center fixed; background-size: cover;">

<header class="site-header">
    <div class="container header-inner">
        <div class="logo">Help Animals By Shamor Johnson</div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>

<main id="page">

    <!-- PAGE TITLE -->
    <section class="page-title">
        <div class="container">
            <h1>Contact Us</h1>
            <p>We’d love to hear from you. Send us a message below.</p>
        </div>
    </section>

    <!-- CONTACT FORM -->
    <section class="contact-section">
        <div class="container">

            <form class="contact-form" action="#" method="post">

                <div class="form-group">
                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="Your Email" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input id="subject" name="subject" type="text" placeholder="What's the subject?" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="What's Your Message?" required></textarea>
                </div>

                <button type="submit">Send Message</button>

            </form>

        </div>
    </section>

</main>

<footer class="site-footer">
    <div class="container">
        <p>© 2024 Help Animals By Shamor Johnson. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
